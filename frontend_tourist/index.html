  <script>
    const I18N = {
      locale: localStorage.getItem('tour_lang') || 'zh',
      data: {},
      async init() {
        try {
          const res = await fetch(`./i18n/${this.locale}.json`);
          this.data = await res.json();
        } catch(e) { this.data = {}; }
        this.applyAll();
      },
      t(key, params) {
        let text = this.data[key] || key;
        if (params) {
          Object.keys(params).forEach(k => { text = text.replace(`{${k}}`, params[k]); });
        }
        return text;
      },
      applyAll() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.dataset.i18n;
          const attr = el.dataset.i18nAttr || 'textContent';
          if (attr === 'textContent') el.textContent = this.t(key);
          else if (attr === 'placeholder') el.placeholder = this.t(key);
          else if (attr === 'title') el.title = this.t(key);
          else if (attr === 'value') el.value = this.t(key);
          else el.setAttribute(attr, this.t(key));
        });
        document.querySelectorAll('[data-i18n-html]').forEach(el => {
          const key = el.dataset.i18nHtml;
          el.innerHTML = this.t(key);
        });
        document.title = this.t('pageTitle');
      },
      async switchLocale(loc) {
        this.locale = loc;
        localStorage.setItem('tour_lang', loc);
        try {
          const res = await fetch(`./i18n/${loc}.json`);
          this.data = await res.json();
        } catch(e) { this.data = {}; }
        this.applyAll();
        // Re-render dynamic content
        if (typeof initRouteSpotTags === 'function') initRouteSpotTags();
        if (typeof setAvatarState === 'function') setAvatarState('idle');
        if (typeof loadWeather === 'function') loadWeather();
        if (typeof loadPhotoSpots === 'function') { photoSpotsData = []; loadPhotoSpots(); }
      }
    };
  </script>

  <script>
    const API_BASE = 'http://localhost:8000';
    let sessionId = localStorage.getItem('tour_session_id') || null;
    let currentInterest = localStorage.getItem('tour_interest') || 'general';
    let currentQuestion = null; // 当前问答的问题，供反馈按钮使用
    let isGenerating = false;
    let map = null;
    let mapInitialized = false;
    let highlightMarker = null;
    let currentUser = null;

    const chatBox = document.getElementById('chatBox');

    let toastTimer = null;
    function showToast(msg, isError = false) {
      let el = document.getElementById('toastEl');
      if (!el) {
        el = document.createElement('div');
        el.id = 'toastEl';
        el.className = 'toast';
        document.body.appendChild(el);
      }
      clearTimeout(toastTimer);
      el.textContent = msg;
      el.className = 'toast' + (isError ? ' error' : '');
      requestAnimationFrame(() => el.classList.add('show'));
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    let pendingImage = null; // { base64: string, dataUrl: string }

    // 图片上传
    document.getElementById('imageBtn').addEventListener('click', () => {
      document.getElementById('imageInput').click();
    });
    document.getElementById('imageInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) { showToast('图片大小不能超过 10MB', true); return; }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        const base64 = dataUrl.split(',')[1];
        pendingImage = { base64, dataUrl };
        document.getElementById('imagePreview').src = dataUrl;
        document.getElementById('imagePreviewWrap').classList.add('show');
        document.getElementById('imageBtn').classList.add('has-image');
      };
      reader.readAsDataURL(file);
    });
    document.getElementById('imageRemoveBtn').addEventListener('click', () => {
      pendingImage = null;
      document.getElementById('imagePreview').src = '';
      document.getElementById('imagePreviewWrap').classList.remove('show');
      document.getElementById('imageBtn').classList.remove('has-image');
      document.getElementById('imageInput').value = '';
    });
    const statusEl = document.getElementById('status');
    const textInput = document.getElementById('textInput');

    // ==================== 登录功能 ====================
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      loginError.classList.remove('show');

      if (!username) { loginError.textContent = I18N.t('loginEmptyUser'); loginError.classList.add('show'); return; }
      if (!password) { loginError.textContent = I18N.t('loginEmptyPwd'); loginError.classList.add('show'); return; }

      loginBtn.disabled = true;
      loginBtn.classList.add('loading');

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || I18N.t('loginFailed'));
        }

        currentUser = data.user;
        localStorage.setItem('tour_user', JSON.stringify(data.user));
        localStorage.setItem('tour_token', data.access_token);

        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('sidebarUserName').textContent = data.user.name || data.user.username;

        initApp();
      } catch (error) {
        loginError.textContent = error.message;
        loginError.classList.add('show');
      } finally {
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
      }
    }

    function handleLogout() {
      localStorage.removeItem('tour_user');
      localStorage.removeItem('tour_token');
      localStorage.removeItem('tour_session_id');
      currentUser = null;
      sessionId = null;
      
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('loginView').style.display = 'flex';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('loginError').classList.remove('show');
    }

    function checkAuth() {
      const token = localStorage.getItem('tour_token');
      const savedUser = localStorage.getItem('tour_user');
      if (token) {
        if (savedUser) {
          try {
            const u = JSON.parse(savedUser);
            currentUser = u;
            document.getElementById('sidebarUserName').textContent = u.name || u.username;
          } catch (_) {}
        }
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        initApp();
        return true;
      }
      return false;
    }

    function initApp() {
      loadSettings();
      loadInterests();
      loadHistory();
      addMessage('bot', I18N.t('welcomeMsg'));
      // Live2D removed
    }

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('pwdToggleBtn').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const btn = document.getElementById('pwdToggleBtn');
      if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '🙈'; }
      else { pwd.type = 'password'; btn.textContent = '👁️'; }
    });
    document.addEventListener('DOMContentLoaded', async () => {
      await I18N.init();
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
      }
      if (checkAuth()) {
        setTimeout(initLive2D, 500);
      }
    });
    const voiceBtn = document.getElementById('voiceBtn');
    const sendBtn = document.getElementById('sendBtn');
    const avatarStatus = document.getElementById('avatarStatus');

    let currentAudio = null;
    let currentAudioUrl = null;
    let ttsAbortController = null;
    let ttsGeneration = 0;
    let chatAbortController = null;

    const getVoice = () => (typeof appSettings !== 'undefined' ? appSettings.ttsVoice : null) || localStorage.getItem('tour_voice') || 'zh-CN-XiaoxiaoNeural';

    function setStatus(msg) { statusEl.textContent = msg || ''; }

    function stopCurrentTTS() {
      if (ttsAbortController) { ttsAbortController.abort(); ttsAbortController = null; }
      if (currentAudio) { currentAudio.pause(); currentAudio.onended = null; currentAudio.onerror = null; currentAudio.src = ''; currentAudio = null; }
      if (currentAudioUrl) { URL.revokeObjectURL(currentAudioUrl); currentAudioUrl = null; }
    }

    function addMessage(role, text, question) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      let inner = '';
      if (role === 'user' && pendingImage) {
        inner += `<img class="bubble-img" src="${escapeHtml(pendingImage.dataUrl)}" alt="上传图片" />`;
      }
      inner += `<div class="bubble">${escapeHtml(text)}</div><span class="time">${time}</span>`;
      div.innerHTML = inner;
      if (role === 'bot') {
        div.innerHTML += createFeedbackHtml(question || '', text);
      }
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function addBotStreamMessage() {
      const div = document.createElement('div');
      div.className = 'msg bot';
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const bubble = document.createElement('div');
      bubble.className = 'bubble streaming';
      bubble.textContent = '';
      div.appendChild(bubble);
      const timeEl = document.createElement('span');
      timeEl.className = 'time';
      timeEl.textContent = time;
      div.appendChild(timeEl);
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      let firstToken = true;
      div.append = function(chunk) {
        if (firstToken) { firstToken = false; setAvatarState('speaking'); }
        bubble.textContent += chunk;
        chatBox.scrollTop = chatBox.scrollHeight;
      };
      div.setFinal = function(text) {
        bubble.textContent = text;
        bubble.classList.remove('streaming');
        chatBox.scrollTop = chatBox.scrollHeight;
        setAvatarState('idle');
        stopCurrentTTS();
        injectMapLink(bubble, text);
        if (currentQuestion) {
          div.insertAdjacentHTML('beforeend', createFeedbackHtml(currentQuestion, text));
        }
      };
      div.setError = function(text) {
        bubble.textContent = text;
        bubble.classList.remove('streaming');
        setAvatarState('idle');
      };
      return div;
    }

    function injectMapLink(bubble, text) {
      const hasMapExpr = text.includes(I18N.t('clickViewMap')) || text.includes(I18N.t('viewMap'));
      if (hasMapExpr) {
        const card = document.createElement('div');
        card.className = 'map-link-card';
        card.textContent = '🗺️ ' + I18N.t('openMap');
        card.addEventListener('click', () => switchToMap());
        bubble.appendChild(card);
        return;
      }
      const mapKeywords = I18N.t('mapKeywords');
      if (mapKeywords.some(k => text.includes(k))) {
        const card = document.createElement('div');
        card.className = 'map-link-card';
        card.textContent = '🗺️ ' + I18N.t('viewMap');
        card.addEventListener('click', () => switchToMap());

      }

    function escapeHtml(s) {

    function createFeedbackHtml(question, answer) {
      const safeQ = (question || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const safeA = (answer || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return `
        <div class="feedback-actions" data-q="${safeQ}" data-a="${safeA}">
          <button class="fb-btn fb-good" data-rating="good">${I18N.t('feedbackGood')}</button>
          <button class="fb-btn fb-bad" data-rating="bad">${I18N.t('feedbackBad')}</button>
        </div>`;
    }

    // 反馈按钮事件委托
    chatBox.addEventListener('click', async (e) => {
      const btn = e.target.closest('.fb-btn');
      if (!btn) return;
      const actions = btn.closest('.feedback-actions');
      const rating = btn.dataset.rating;
      // 如果已经选中同一按钮，取消选中
      if (btn.classList.contains('picked')) {
        actions.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('picked'));
        actions.classList.remove('active');
        return;
      }
      // 切换选中状态
      actions.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('picked'));
      btn.classList.add('picked');
      actions.classList.add('active');
      // 提交反馈到后端
      try {
        await fetch(`${API_BASE}/chat/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: sessionId,
            question: actions.dataset.q || '',
            answer: actions.dataset.a || '',
            rating: rating,
            comment: '',
          }),
        });
      } catch (err) { /* 静默失败，用户无感知 */ }
    });

    async function playTTS(text, generation) {
      stopCurrentTTS();
      ttsAbortController = new AbortController();
      const signal = ttsAbortController.signal;
      const voice = getVoice();
      const rate = getTtsSpeed();
      try {
        const res = await fetch(`${API_BASE}/text-to-speech`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text.slice(0, 500), voice, rate }),
          signal,
        });
        if (generation !== ttsGeneration) return;
        if (!res.ok) return;
        const blob = await res.blob();
        if (generation !== ttsGeneration) return;
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        currentAudio = audio;
        currentAudioUrl = url;

        if (live2dModel) {
          const motionIdx = Math.floor(Math.random() * 4);
          live2dModel.motion('TapBody', motionIdx);
        }

        let lipSyncInterval = null;
        let mouthOpenTime = 0;
        if (live2dModel) {
          lipSyncInterval = setInterval(() => {
            if (!currentAudio || currentAudio.paused) return;
            mouthOpenTime += 0.05;
            const mouthOpen = 0.4 + Math.sin(mouthOpenTime * 8) * 0.35 + Math.random() * 0.15;
            try {
              if (live2dModel.internalModel && live2dModel.internalModel.coreModel) {
                live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', Math.min(1, Math.max(0, mouthOpen)));
              }
            } catch (e) { /* 静默失败 */ }
          }, 50);
        }

        const gestureInterval = setInterval(() => {
          if (!currentAudio || currentAudio.paused) return;
          if (live2dModel) {
            const motionIdx = Math.floor(Math.random() * 4);
            live2dModel.motion('TapBody', motionIdx);
          }
        }, 4000);

        audio.onended = () => {
          clearInterval(gestureInterval);
          clearInterval(lipSyncInterval);
          if (currentAudioUrl === url) { URL.revokeObjectURL(url); currentAudioUrl = null; }
          currentAudio = null;
          setAvatarState('idle');
          if (live2dModel) {
            live2dModel.motion('Idle');
          }
        };
        audio.onerror = () => { 
          clearInterval(gestureInterval);
          clearInterval(lipSyncInterval);
          stopCurrentTTS(); 
          setAvatarState('idle'); 
          if (live2dModel) {
            live2dModel.motion('Idle');
          }
        };
        if (generation !== ttsGeneration) { URL.revokeObjectURL(url); return; }
        await audio.play();
      } catch (e) {
        if (e.name === 'AbortError') return;
        setAvatarState('idle');
        if (live2dModel) {
          live2dModel.motion('Idle');
        }
      }
    }

    // 供路线规划调用：发送消息并等待回答
    async function sendMessage(question, skipRouteCheck) {
      if (skipRouteCheck) {
        currentQuestion = question;
        isGenerating = true;
        abortCurrentChat();
        stopCurrentTTS();
        const myGen = ++ttsGeneration;
        addMessage('user', question);
        setAvatarState('thinking');
        sendBtn.disabled = true;
        chatAbortController = new AbortController();
        const streamMsg = addBotStreamMessage();

        try {
          const body = { question, session_id: sessionId, interest: currentInterest, lang: I18N.locale };
          if (pendingImage) { body.image = pendingImage.base64; }
          const res = await fetch(`${API_BASE}/chat/text/stream`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: chatAbortController.signal,
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `请求失败 (${res.status})`);
          }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let finalAnswer = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            if (myGen !== ttsGeneration) break;
            buffer += decoder.decode(value, { stream: true });
            const blocks = buffer.split('\n\n');
            buffer = blocks.pop() || '';
            for (const block of blocks) {
              const line = block.split('\n').find(l => l.startsWith('data: '));
              if (!line) continue;
              try {
                const payload = JSON.parse(line.slice(6));
                if (payload.type === 'token') {
                  finalAnswer += payload.content;
                  streamMsg.querySelector('.bubble').textContent = finalAnswer;
                  chatBox.scrollTop = chatBox.scrollHeight;
                } else if (payload.type === 'expression') {
                  setAvatarState(payload.expression);
                } else if (payload.type === 'done') {
                  finalAnswer = payload.answer || finalAnswer;
                  sessionId = payload.session_id || sessionId;
                  if (sessionId) localStorage.setItem('tour_session_id', sessionId);
                } else if (payload.type === 'error') {
                  throw new Error(payload.message);
                }
              } catch (_) {}
            }
          }
          streamMsg.querySelector('.bubble').textContent = finalAnswer || I18N.t('answerDone');
          streamMsg.querySelector('.bubble').classList.remove('streaming');
          setAvatarState('idle');
          // 添加反馈按钮
          if (finalAnswer && currentQuestion) {
            streamMsg.insertAdjacentHTML('beforeend', createFeedbackHtml(currentQuestion, finalAnswer));
          }
          injectMapLink(streamMsg.querySelector('.bubble'), finalAnswer);
          if (myGen === ttsGeneration && finalAnswer) {
            playTTS(finalAnswer, myGen);
          }
        } catch (e) {
          if (e.name !== 'AbortError') {
            streamMsg.querySelector('.bubble').textContent = I18N.t('networkError');
            streamMsg.querySelector('.bubble').classList.remove('streaming');
            setAvatarState('idle');
          }
        } finally {
          isGenerating = false;
          sendBtn.disabled = false;
          chatAbortController = null;
          if (pendingImage) {
            pendingImage = null;
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreviewWrap').classList.remove('show');
            document.getElementById('imageBtn').classList.remove('has-image');
            document.getElementById('imageInput').value = '';
          }
        }
      } else {
        textInput.value = question;
        sendBtn.click();
      }
    }

    async function askQuestion(question) {
      if (!question.trim() || isGenerating) return;

      // 检测路线规划意图
      const routeKeywords = I18N.t('routeKeywords');
      const isRouteRequest = routeKeywords.some(k => question.includes(k));
      if (isRouteRequest && !question.startsWith('___GUIDE___')) {
        // 切换到地图页面并打开路线规划面板
        switchToMap();
        setTimeout(() => {
          document.getElementById('routePanel').classList.add('show');
          addMessage('bot', I18N.t('routeGuideMsg'));
        }, 500);
        return;
      }

      currentQuestion = question;
      isGenerating = true;
      abortCurrentChat();
      stopCurrentTTS();
      const myGen = ++ttsGeneration;
      addMessage('user', question);
      setAvatarState('thinking');
      sendBtn.disabled = true;
      chatAbortController = new AbortController();
      const streamMsg = addBotStreamMessage();

      try {
        const res = await fetch(`${API_BASE}/chat/text/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, session_id: sessionId, interest: currentInterest, lang: I18N.locale }),
          signal: chatAbortController.signal,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `请求失败 (${res.status})`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalAnswer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (myGen !== ttsGeneration) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split('\n\n');
          buffer = blocks.pop() || '';
          for (const block of blocks) {
            const line = block.split('\n').find(l => l.startsWith('data: '));
            if (!line) continue;
            let data;
            try { data = JSON.parse(line.slice(6)); } catch { continue; }
            if (data.type === 'expression') {
              if (data.expression === 'thinking') setAvatarState('thinking');
            } else if (data.type === 'token' && data.content) {
              streamMsg.append(data.content);
            } else if (data.type === 'done') {
              sessionId = data.session_id;
              localStorage.setItem('tour_session_id', sessionId);
              finalAnswer = data.answer || '';
              streamMsg.setFinal(finalAnswer);
              loadHistory();
            } else if (data.type === 'error') {
              throw new Error(data.message || I18N.t('streamError'));
            }
          }
        }
        if (myGen === ttsGeneration && finalAnswer) await playTTS(finalAnswer, myGen);
      } catch (e) {
        if (e.name === 'AbortError') return;
        streamMsg.setError(I18N.t('serviceUnavailable') + ': ' + e.message);
        setAvatarState('idle');
      } finally {
        chatAbortController = null;
        sendBtn.disabled = false;
        isGenerating = false;
      }
    }

    function abortCurrentChat() {
      if (chatAbortController) { chatAbortController.abort(); chatAbortController = null; }
    }

    sendBtn.addEventListener('click', () => {

      textInput.value = '';
      askQuestion(q);
    });
    textInput.addEventListener('keydown', (e) => {

    // ==================== 语音录制 ====================
    let mediaRecorder = null;
    let audioChunks = [];
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        voiceBtn.classList.add('recording');
        setStatus(I18N.t('recording'));
      } catch (e) { setStatus(I18N.t('micError') + ': ' + e.message); }
    }
    async function stopRecordingAndSend() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
      voiceBtn.classList.remove('recording');
      setStatus(I18N.t('recognizing'));
      return new Promise(resolve => {
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          mediaRecorder.stream.getTracks().forEach(t => t.stop());
          const form = new FormData();
          form.append('file', blob, 'recording.webm');
          try {
            const res = await fetch(`${API_BASE}/voice-to-text`, { method: 'POST', body: form });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '识别失败');
            setStatus('');
            if (data.text && data.text !== '(未识别到内容)') {
              textInput.value = data.text;
              await askQuestion(data.text);
            } else { setStatus(I18N.t('noVoice')); }
          } catch (e) { setStatus(I18N.t('voiceError') + ': ' + e.message); }
          resolve();
        };
        mediaRecorder.stop();
      });
    }
    voiceBtn.addEventListener('mousedown', startRecording);
    voiceBtn.addEventListener('mouseup', stopRecordingAndSend);
    voiceBtn.addEventListener('mouseleave', () => {
      if (mediaRecorder?.state === 'recording') stopRecordingAndSend();
    });
    voiceBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
    voiceBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecordingAndSend(); });

    let mapMarkers = [];

    function initMap(centerOn) {
      if (mapInitialized) {
        if (centerOn) {
          highlightMarker = centerOn.id;
          map.setZoomAndCenter(16, [centerOn.lng, centerOn.lat]);
          refreshMarkers();
        }
        return;
      }

      const centerLat = centerOn ? centerOn.lat : 31.4220;
      const centerLng = centerOn ? centerOn.lng : 120.100;
      const zoom = centerOn ? 16 : 14;

      map = new AMap.Map('mapContainer', {
        zoom: zoom,
        center: [centerLng, centerLat],
        mapStyle: 'amap://styles/normal',
        resizeEnable: true,
      });

      refreshMarkers();
      mapInitialized = true;
    }

    function refreshMarkers() {
      if (!map) return;
      map.clearMap();
      mapMarkers = [];

      SPOTS.forEach(spot => {
        const isHighlight = highlightMarker === spot.id;
        const size = isHighlight ? 48 : 32;
        const height = isHighlight ? 60 : 42;
        const color = isHighlight ? '#f59e0b' : '#0d9488';

        const icon = new AMap.Icon({
          size: new AMap.Size(size, height),
          image: isHighlight ? createHighlightIcon(color, size) : createMarkerIcon(color, size),
          imageSize: new AMap.Size(size, height),
          imageOffset: new AMap.Pixel(0, 0),
        });

        const marker = new AMap.Marker({
          position: [spot.lng, spot.lat],
          icon: icon,
          offset: new AMap.Pixel(-size / 2, -height),
          zIndex: isHighlight ? 1000 : 100,
        });

        const infoContent = `
          <div class="amap-info-content">
            <h3>${spot.icon} ${spot.name}</h3>
            <div class="pop-desc">${getSpotDesc(spot)}</div>
            <div class="pop-ask" data-spot="${spot.name}">💬 ${I18N.t('askAI')}</div>
          </div>`;

        const infoWindow = new AMap.InfoWindow({
          content: infoContent,
          offset: new AMap.Pixel(0, -height - 8),
        });

        marker.on('click', () => {
          infoWindow.open(map, marker.getPosition());
          setTimeout(() => {
            const btn = document.querySelector(`.pop-ask[data-spot="${spot.name}"]`);
            if (btn) {
              btn.addEventListener('click', () => {
                infoWindow.close();
                switchToChat();
                setTimeout(() => {
                  textInput.value = I18N.t('spotDetailPrompt', {name: spot.name});
                  sendBtn.click();
                }, 300);
              });
            }
          }, 100);
        });

        map.add(marker);
        mapMarkers.push(marker);
      });
    }

      document.querySelectorAll('.sidebar-nav-btn.nav').forEach(b => b.classList.remove('active'));

      document.getElementById('serviceView').classList.remove('active');

      document.getElementById('photoSpotView').classList.remove('active');

    let routeMarkers = [];      // 路线标记

    function initRouteSpotTags() {
      const container = document.getElementById('rpSpotTags');
      if (container.children.length > 0) return; // 已初始化
      SPOTS.forEach(spot => {
        const tag = document.createElement('span');
        tag.className = 'rp-spot-tag';
        tag.textContent = spot.icon + ' ' + spot.name;
        tag.dataset.spotId = spot.id;
        tag.addEventListener('click', () => {
          tag.classList.toggle('selected');
        });
        container.appendChild(tag);
      });

    // 打开/关闭路线规划面板
    document.getElementById('routePlanBtn').addEventListener('click', () => {
      const panel = document.getElementById('routePanel');
      const result = document.getElementById('routeResult');
      if (panel.classList.contains('show')) {
        panel.classList.remove('show');
      } else {
        result.classList.remove('show');
        panel.classList.add('show');
      }
    });

    document.getElementById('rpCloseBtn').addEventListener('click', () => {
      document.getElementById('routePanel').classList.remove('show');
    });

    document.getElementById('rrCloseBtn').addEventListener('click', () => {
      document.getElementById('routeResult').classList.remove('show');
      clearRouteOverlay();
    });

    // 生成路线
    document.getElementById('rpGenerateBtn').addEventListener('click', async () => {
      const btn = document.getElementById('rpGenerateBtn');
      const loading = document.getElementById('rpLoading');
      btn.disabled = true;
      loading.style.display = 'block';

      try {
        const preference = document.getElementById('rpPreference').value;
        const duration = document.getElementById('rpDuration').value;
        const selectedTags = document.querySelectorAll('#rpSpotTags .rp-spot-tag.selected');
        const spotIds = Array.from(selectedTags).map(t => t.dataset.spotId);

        const res = await fetch(`${API_BASE}/api/route/plan`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ preference, duration, spot_ids: spotIds, lang: I18N.locale }),
        });
        if (!res.ok) throw new Error('API 请求失败');
        const data = await res.json();

        routeData = data;
        renderRouteResult(data);
        drawRouteOnMap(data.spots);
      } catch (e) {
        console.error('路线规划失败:', e);
        showToast(I18N.t('routeFail'), true);
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
        document.getElementById('routePanel').classList.remove('show');

    function renderRouteResult(data) {
      document.getElementById('rrTitle').textContent = data.title;
      document.getElementById('rrTips').textContent = '💡 ' + data.tips;

      const list = document.getElementById('rrSpotList');
      list.innerHTML = '';
      data.spots.forEach((spot, idx) => {
        const card = document.createElement('div');
        card.className = 'rr-spot-card';
        card.innerHTML = `
          <div class="rr-num">${idx + 1}</div>
          <div class="rr-info">
            <div class="rr-name">${spot.icon} ${spot.name}</div>
            <div class="rr-reason">${spot.reason}</div>
          </div>`;
        card.addEventListener('click', () => {
          routeCurrentIdx = idx;
          highlightRouteSpot(idx);
          map.setZoomAndCenter(16, [spot.lng, spot.lat]);
        });
        list.appendChild(card);
      });

      document.getElementById('routeResult').classList.add('show');
    }

    function drawRouteOnMap(spots) {
      clearRouteOverlay();
      if (!map || spots.length < 2) return;

      // 画折线
      const path = spots.map(s => [s.lng, s.lat]);
      routePolyline = new AMap.Polyline({
        path: path,
        strokeColor: '#0d9488',
        strokeWeight: 4,
        strokeOpacity: 0.7,
        lineJoin: 'round',
        strokeStyle: 'dashed',
        showDir: true,
      });
      map.add(routePolyline);

      // 画起点/终点/中间标记
      spots.forEach((spot, idx) => {
        const isFirst = idx === 0;
        const isLast = idx === spots.length - 1;
        let color = '#0d9488';
        let label = String(idx + 1);
        if (isFirst) color = '#10b981';
        if (isLast) color = '#f59e0b';

        const marker = new AMap.Marker({
          position: [spot.lng, spot.lat],
          content: `<div style="width:22px;height:22px;border-radius:50%;background:${color};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${label}</div>`,
          offset: new AMap.Pixel(-11, -11),
          zIndex: 900,
        });
        map.add(marker);
        routeMarkers.push(marker);
      });

      map.setFitView();
    }

    function clearRouteOverlay() {
      if (routePolyline) { map.remove(routePolyline); routePolyline = null; }
      routeMarkers.forEach(m => map.remove(m));
      routeMarkers = [];
      routeCurrentIdx = -1;
    }

    function highlightRouteSpot(idx) {
      if (!routeData) return;
      document.querySelectorAll('.rr-spot-card').forEach((c, i) => {
        c.classList.toggle('active', i === idx);
      });
    }

    // 开始导览
    document.getElementById('rrStartBtn').addEventListener('click', async () => {
      if (!routeData || routeData.spots.length === 0) return;
      routeCurrentIdx = 0;
      highlightRouteSpot(0);
      const spot = routeData.spots[0];
      map.setZoomAndCenter(16, [spot.lng, spot.lat]);

      // 切换到聊天页面，发送导览请求
      switchToChat();
      const introMsg = I18N.t('guideStartMsg', {title: routeData.title, name: spot.name});
      await sendMessage(introMsg, true);
    });

    // 暴露给聊天：继续下一个景点
    function guideNextSpot() {
      if (!routeData || routeCurrentIdx >= routeData.spots.length - 1) return null;
      routeCurrentIdx++;
      highlightRouteSpot(routeCurrentIdx);
      const spot = routeData.spots[routeCurrentIdx];
      map.setZoomAndCenter(16, [spot.lng, spot.lat]);
      return spot;
    }

    const SETTINGS_KEY = 'tour_settings';
    let appSettings = {
      ttsSpeed: 'medium',

      avatarAnim: true,
      defaultInterest: 'general',
      theme: 'light',
      fontSize: 'normal',

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (raw) appSettings = { ...appSettings, ...JSON.parse(raw) };
      } catch (_) {}
      if (appSettings.defaultInterest && appSettings.defaultInterest !== currentInterest) {
        currentInterest = appSettings.defaultInterest;
        localStorage.setItem('tour_interest', currentInterest);
      }
      applyTheme();
      applyFontSize();
      try { setAvatarState('idle'); } catch (_) {}
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings));
      applyTheme();
      applyFontSize();
      try { setAvatarState('idle'); } catch (_) {}
    }

    function applyTheme() {
      document.body.classList.remove('dark', 'light');
      let mode = appSettings.theme;
      if (mode === 'auto') {
        mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.body.classList.add(mode);
    }

    function applyFontSize() {
      document.body.classList.remove('font-large', 'font-xlarge');
      if (appSettings.fontSize !== 'normal') document.body.classList.add('font-' + appSettings.fontSize);
    }

    function getTtsVoice() { return appSettings.ttsVoice; }

      chatBox.scrollTop = chatBox.scrollHeight;
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (appSettings.theme === 'auto') applyTheme();
    });

    // ==================== 历史对话管理 ====================
    async function loadHistory() {
      try {
        const res = await fetch(`${API_BASE}/chat/sessions`);
        const data = await res.json();
        const list = document.getElementById('historyList');
        const sessions = data.sessions || [];
        if (sessions.length === 0) {
          list.innerHTML = '<div class="history-empty"><span data-i18n="noHistory"></span></div>';
          return;
        }
        list.innerHTML = sessions.map(s => {
          const time = new Date(s.last_time).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          const isActive = s.session_id === sessionId;
          return `<div class="history-item${isActive ? ' active' : ''}" data-sid="${s.session_id}">
            <div class="history-title">${escapeHtml(s.title)}</div>
            <div class="history-meta">
              <span>${s.msg_count}${I18N.t('msgCount')}</span>
            </div>
            <div class="history-time">${time}</div>
          </div>`;
        }).join('');
        list.querySelectorAll('.history-item').forEach(item => {
          item.addEventListener('click', async () => {
            const sid = item.dataset.sid;
            await loadSessionMessages(sid);
            list.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
          });
        });
      } catch (_) {}
    }

    async function loadSessionMessages(targetSid) {
      try {
        sessionId = targetSid;
        localStorage.setItem('tour_session_id', sessionId);
        const res = await fetch(`${API_BASE}/chat/sessions/${targetSid}/messages`);
        const data = await res.json();
        const messages = data.messages || [];
        chatBox.innerHTML = '';
        messages.forEach(m => {
          addMessage('user', m.question);
          addMessage('bot', m.answer, m.question);
        });
        switchToChat();
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (e) {
        console.error('加载会话消息失败:', e);
      }
    }

    async function createNewSession() {
      stopCurrentTTS();
      abortCurrentChat();
      setAvatarState('idle');
      currentInterest = appSettings.defaultInterest;
      try {
        const res = await fetch(`${API_BASE}/chat/sessions`, { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;
        localStorage.setItem('tour_session_id', sessionId);
        chatBox.innerHTML = '';
        addMessage('bot', I18N.t('welcomeNewSession'));
        switchToChat();
        loadHistory();
      } catch (_) {}
    }

    document.getElementById('newChatBtn').addEventListener('click', createNewSession);

    // ==================== Live2D 数字人 ====================
    let live2dApp = null;
    let live2dModel = null;

    async function initLive2D() {
      const container = document.getElementById('live2dContainer');
      if (!container || live2dApp) return;

      try {
        if (typeof PIXI === 'undefined') throw new Error('PIXI 未加载');

        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        container.appendChild(canvas);

        live2dApp = new PIXI.Application({
          view: canvas,
          autoStart: true,
          backgroundAlpha: 0,
          width: container.clientWidth,
          height: container.clientHeight,
          resolution: 1,
          preserveDrawingBuffer: true,
          premultipliedAlpha: true,
        });

        // 等待渲染器就绪
        await new Promise(resolve => {
          live2dApp.renderer.on('postrender', function handler() {
            live2dApp.renderer.off('postrender', handler);
            resolve();
          });
        });

        const modelPath = './live2d_sdk/public/characters/free/Haru/Haru.model3.json';
        live2dModel = await PIXI.live2d.Live2DModel.from(modelPath);

        // 修复 pixi-live2d-display v0.5 bug：模型不使用 masking 时 _clippingManager 为 undefined
        const origUpdate = live2dModel.internalModel.updateWebGLContext;
        live2dModel.internalModel.updateWebGLContext = function(gl, glContextID) {
          this.renderer.firstDraw = true;
          this.renderer._bufferData = { vertex: null, uv: null, index: null };
          this.renderer.startUp(gl);
          if (this.renderer._clippingManager) {
            this.renderer._clippingManager._currentFrameNo = glContextID;
            this.renderer._clippingManager._maskTexture = undefined;
          }
          if (typeof CubismShader_WebGL !== 'undefined') {
            CubismShader_WebGL.getInstance()._shaderSets = [];
          }
        };

        const scale = Math.min(
          container.clientWidth / live2dModel.width,
          container.clientHeight / live2dModel.height
        ) * 1.2;

        live2dModel.scale.set(scale);
        live2dModel.anchor.set(0.5, 0.5);
        live2dModel.x = container.clientWidth / 2;
        live2dModel.y = container.clientHeight / 2;

        live2dApp.stage.addChild(live2dModel);

        window.addEventListener('resize', () => {
          if (!live2dModel || !container || !live2dApp) return;
          live2dApp.renderer.resize(container.clientWidth, container.clientHeight);
          const s = Math.min(
            container.clientWidth / live2dModel.width,
            container.clientHeight / live2dModel.height
          ) * 1.2;
          live2dModel.scale.set(s);
          live2dModel.x = container.clientWidth / 2;
          live2dModel.y = container.clientHeight / 2;
        });

        console.log('Live2D 模型加载成功');
      } catch (error) {
        console.error('Live2D 加载失败:', error);
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:0.85rem;">' + I18N.t('live2dLoadError') + '</div>';
      }
    }

    // ==================== AI 游记 ====================
    let currentTravelogueId = null;
    let allTravelogues = [];

    function switchToTravelogue() {
      document.querySelectorAll('.sidebar-nav-btn.nav').forEach(b => b.classList.remove('active'));
      document.getElementById('navTravelogueBtn').classList.add('active');
      document.getElementById('chatView').classList.remove('active');
      document.getElementById('mapView').classList.remove('active');
      document.getElementById('serviceView').classList.remove('active');
      document.getElementById('settingsView').classList.remove('active');
      document.getElementById('photoSpotView').classList.remove('active');
      document.getElementById('travelogueView').classList.add('active');
      loadTravelogueList();
    }

    async function loadTravelogueList() {
      try {
        const res = await fetch(`${API_BASE}/api/travelogues`);
        const data = await res.json();
        allTravelogues = data.travelogues || [];

        if (allTravelogues.length === 0) {
          document.getElementById('tgEmpty').style.display = 'flex';
          document.getElementById('tgLoading').style.display = 'none';
          document.getElementById('tgDetail').style.display = 'none';
          return;
        }

        renderTravelogueList();
        if (!currentTravelogueId || !allTravelogues.find(t => t.id === currentTravelogueId)) {
          currentTravelogueId = allTravelogues[0].id;
        }
        await showTravelogueDetail(currentTravelogueId);
      } catch (e) {
        console.error('加载游记列表失败:', e);
        document.getElementById('tgEmpty').style.display = 'flex';
        document.getElementById('tgLoading').style.display = 'none';
        document.getElementById('tgDetail').style.display = 'none';
      }
    }

    function renderTravelogueList() {
      const list = document.getElementById('tgList');
      list.innerHTML = '';
      const styleLabels = { literary: '文艺', guide: '攻略', relaxed: '随笔' };

      allTravelogues.forEach(t => {
        const item = document.createElement('div');
        item.className = 'tg-list-item';
        if (t.id === currentTravelogueId) item.classList.add('active');
        item.dataset.tgId = t.id;
        item.innerHTML = `
          <div class="tg-li-title">${escapeHtml(t.title)}</div>
          <div class="tg-li-meta">
            <span class="tg-li-style">${styleLabels[t.style] || t.style}</span>
            <span>${new Date(t.created_at).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })}</span>
          </div>`;
        item.addEventListener('click', () => {
          if (currentTravelogueId === t.id) return;
          currentTravelogueId = t.id;
          renderTravelogueList();
          showTravelogueDetail(t.id);
        });
        list.appendChild(item);
      });
    }

    async function showTravelogueDetail(tgId) {
      try {
        document.getElementById('tgEmpty').style.display = 'none';
        document.getElementById('tgLoading').style.display = 'block';
        document.getElementById('tgDetail').style.display = 'none';

        const res = await fetch(`${API_BASE}/api/travelogues/${tgId}`);
        if (!res.ok) throw new Error('游记不存在');
        const data = await res.json();

        currentTravelogueId = data.id;
        document.getElementById('tgTitle').textContent = data.title;
        document.getElementById('tgDate').textContent = new Date(data.created_at).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('tgStyleBadge').textContent = I18N.t('travelogueStyle' + data.style.charAt(0).toUpperCase() + data.style.slice(1));

        const spotTags = document.getElementById('tgSpotTags');
        spotTags.innerHTML = '';
        (data.spots_visited || []).forEach(name => {
          const tag = document.createElement('span');
          tag.className = 'tg-spot-tag';
          tag.textContent = name;
          spotTags.appendChild(tag);
        });

        const content = document.getElementById('tgContent');
        if (typeof marked !== 'undefined') {
          content.innerHTML = marked.parse(data.content);
        } else {
          content.textContent = data.content;
        }

        document.getElementById('tgLoading').style.display = 'none';
        document.getElementById('tgDetail').style.display = 'block';
      } catch (e) {
        console.error('加载游记失败:', e);
        document.getElementById('tgLoading').style.display = 'none';
        document.getElementById('tgEmpty').style.display = 'flex';
        document.getElementById('tgEmpty').querySelector('.tg-empty-text').textContent = I18N.t('travelogueNoData');
      }
    }

    function showStyleModal(callback) {
      const modal = document.createElement('div');
      modal.className = 'tg-style-modal';
      modal.innerHTML = `
        <div class="tg-style-modal-content">
          <h3>${I18N.t('travelogueStyle')}</h3>
          <button class="tg-style-option" data-style="literary">
            <div class="style-name">✨ ${I18N.t('travelogueStyleLiterary')}</div>
            <div class="style-desc">语言优美，富有诗意，适合分享</div>
          </button>
          <button class="tg-style-option" data-style="guide">
            <div class="style-name">📋 ${I18N.t('travelogueStyleGuide')}</div>
            <div class="style-desc">路线总结、实用 tips、时间安排</div>
          </button>
          <button class="tg-style-option" data-style="relaxed">
            <div class="style-name">☕ ${I18N.t('travelogueStyleRelaxed')}</div>
            <div class="style-desc">语气亲切自然，像朋友聊天</div>
          </button>
        </div>`;
      document.body.appendChild(modal);

      modal.addEventListener('click', (e) => {
        if (e.target === modal) { modal.remove(); callback(null); }
      });
      modal.querySelectorAll('.tg-style-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const style = btn.dataset.style;
          modal.remove();
          callback(style);
        });
      });
    }

    async function generateTravelogue(style) {
      if (!sessionId) { showToast(I18N.t('noConversation'), true); return; }

      document.getElementById('tgEmpty').style.display = 'none';
      document.getElementById('tgLoading').style.display = 'block';
      document.getElementById('tgDetail').style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/chat/travelogue`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, style: style || 'literary', lang: I18N.locale }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || I18N.t('generateFailed'));
        }
        const data = await res.json();
        currentTravelogueId = data.id;
        const listRes = await fetch(`${API_BASE}/api/travelogues`);
        const listData = await listRes.json();
        allTravelogues = listData.travelogues || [];
        renderTravelogueList();
        await showTravelogueDetail(data.id);
        switchToTravelogue();
      } catch (e) {
        console.error('游记生成失败:', e);
        document.getElementById('tgLoading').style.display = 'none';
        document.getElementById('tgEmpty').style.display = 'flex';
        document.getElementById('tgEmpty').querySelector('.tg-empty-text').textContent = I18N.t('generateFailed') + ': ' + e.message;
      }
    }

    // 游记页面按钮事件
    document.getElementById('tgRegenerateBtn').addEventListener('click', () => {
      showStyleModal((style) => { if (style) generateTravelogue(style); });
    });

    document.getElementById('tgCopyBtn').addEventListener('click', () => {
      const text = document.getElementById('tgContent').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('tgCopyBtn');
        const orig = btn.textContent;
        btn.textContent = '✅ ' + I18N.t('travelogueCopied');
        btn.style.color = '#10b981'; btn.style.borderColor = '#6ee7b7';
        setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
      }).catch(() => { showToast(I18N.t('copyFailed'), true); });
    });

    document.getElementById('tgDeleteBtn').addEventListener('click', async () => {
      if (!currentTravelogueId) return;
      if (!confirm(I18N.t('travelogueDeleteConfirm'))) return;
      try {
        await fetch(`${API_BASE}/api/travelogues/${currentTravelogueId}`, { method: 'DELETE' });
        allTravelogues = allTravelogues.filter(t => t.id !== currentTravelogueId);
        if (allTravelogues.length > 0) {
          currentTravelogueId = allTravelogues[0].id;
          renderTravelogueList();
          await showTravelogueDetail(currentTravelogueId);
        } else {
          currentTravelogueId = null;
          document.getElementById('tgDetail').style.display = 'none';
          document.getElementById('tgEmpty').style.display = 'flex';
          document.getElementById('tgEmpty').querySelector('.tg-empty-text').textContent = I18N.t('travelogueEmpty');
        }
      } catch (e) { console.error('删除游记失败:', e); }
    });

    // ==================== 天气 + 穿衣建议 ====================
    async function loadWeather() {
      const panel = document.getElementById('weatherPanel');
      if (!panel) return;
      try {
        const res = await fetch(`${API_BASE}/api/weather?lat=31.425&lng=120.10&lang=${I18N.locale}`);
        if (!res.ok) throw new Error('Weather API error');
        const data = await res.json();
        const c = data.current;
        const mapIcon = {
          '晴': '☀️', 'Sunny': '☀️', 'Clear': '☀️', '晴れ': '☀️', '맑음': '☀️',
          '多云': '⛅', 'Cloudy': '⛅', 'Partly cloudy': '⛅', '曇り': '⛅', '흐림': '⛅',
          '阴': '☁️', 'Overcast': '☁️', '小雨': '🌧️', '雨': '🌧️', 'Rain': '🌧️', 'Light rain': '🌧️',
          'Mist': '🌫️', 'Fog': '🌫️', '雾': '🌫️', 'Snow': '🌨️', '雪': '🌨️',
        };
        let icon = '🌤️';
        for (const [k, v] of Object.entries(mapIcon)) {
          if (c.weather_desc.includes(k)) { icon = v; break; }
        }
        document.getElementById('weatherIcon').textContent = icon;
        document.getElementById('weatherTemp').textContent = `${c.temp_c}°C`;
        document.getElementById('weatherDesc').textContent = c.weather_desc;
        document.getElementById('weatherFeel').textContent = `${c.feels_like}°C`;
        document.getElementById('weatherHumidity').textContent = `${c.humidity}%`;
        if (data.clothing_advice) {
          document.getElementById('clothingAdvice').style.display = 'block';
          document.getElementById('clothingText').textContent = data.clothing_advice;
        }
      } catch (e) {
        console.error('天气加载失败:', e);
        document.getElementById('weatherTemp').textContent = I18N.t('weatherDefault') + '°C';
        document.getElementById('weatherDesc').textContent = I18N.t('weatherFail');
      }
    }
    loadWeather();
    // 每30分钟刷新一次天气
    setInterval(loadWeather, 30 * 60 * 1000);

    // ==================== 停车场定位 ====================
    const PARKING_KEY = 'tour_parking_pos';
    let parkingPos = null;

    function loadParkingState() {
      try {
        const saved = localStorage.getItem(PARKING_KEY);
        if (saved) {
          parkingPos = JSON.parse(saved);
          document.getElementById('parkingSaveBtn').style.display = 'none';
          document.getElementById('parkingInfo').style.display = 'block';
        }
      } catch (e) { /* ignore */ }
    }

    document.getElementById('parkingSaveBtn').addEventListener('click', () => {
      if (!navigator.geolocation) {
        showToast(I18N.t('geoNotSupported'), true);
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          parkingPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          localStorage.setItem(PARKING_KEY, JSON.stringify(parkingPos));
          document.getElementById('parkingSaveBtn').style.display = 'none';
          document.getElementById('parkingInfo').style.display = 'block';
        },
        (err) => {
          showToast(I18N.t('geoFailed') + ': ' + err.message, true);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    document.getElementById('parkingGoBtn').addEventListener('click', () => {
      if (!parkingPos) return;
      const url = `https://uri.amap.com/navigation?to=${parkingPos.lng},${parkingPos.lat},停车场&mode=walk&coordinate=gaode`;
      window.open(url, '_blank');
    });

    document.getElementById('parkingClearBtn').addEventListener('click', () => {
      parkingPos = null;
      localStorage.removeItem(PARKING_KEY);
      document.getElementById('parkingSaveBtn').style.display = 'block';
      document.getElementById('parkingInfo').style.display = 'none';
    });

    loadParkingState();

    // ==================== 拍照点推荐 ====================
    let photoSpotsData = [];

    function switchToPhotoSpots() {
      document.querySelectorAll('.sidebar-nav-btn.nav').forEach(b => b.classList.remove('active'));
      document.getElementById('navPhotoSpotBtn').classList.add('active');
      document.getElementById('chatView').classList.remove('active');
      document.getElementById('mapView').classList.remove('active');
      document.getElementById('serviceView').classList.remove('active');
      document.getElementById('settingsView').classList.remove('active');
      document.getElementById('travelogueView').classList.remove('active');
      
      document.getElementById('photoSpotView').classList.add('active');
      loadPhotoSpots();
    }

    async function loadPhotoSpots() {
      if (photoSpotsData.length > 0) {
        renderPhotoSpots();
        return;
      }
      document.getElementById('psLoading').style.display = 'block';
      document.getElementById('psEmpty').style.display = 'none';
      document.getElementById('psList').style.display = 'none';
      try {
        const res = await fetch(`${API_BASE}/api/photo-spots`);
        const data = await res.json();
        photoSpotsData = data.spots || [];
        renderPhotoSpots();
      } catch (e) {
        console.error('拍照点加载失败:', e);
        document.getElementById('psLoading').style.display = 'none';
        document.getElementById('psEmpty').style.display = 'block';
      }
    }

    function renderPhotoSpots() {
      document.getElementById('psLoading').style.display = 'none';
      const list = document.getElementById('psList');
      list.style.display = 'flex';
      if (photoSpotsData.length === 0) {
        document.getElementById('psEmpty').style.display = 'block';
        list.style.display = 'none';
        return;
      }
      document.getElementById('psEmpty').style.display = 'none';
      list.innerHTML = '';
      photoSpotsData.forEach(spot => {
        const card = document.createElement('div');
        card.className = 'ps-card';
        const photoItems = spot.photo_spots.map(p => `
          <div class="ps-photo-item">
            <div class="ps-photo-tip">${escapeHtml(p.tip)}</div>
            <div class="ps-photo-meta">
              <span>📐 ${escapeHtml(p.angle)}</span>
              <span>🕐 ${escapeHtml(p.best_time)}</span>
            </div>
          </div>`).join('');

        card.innerHTML = `
          <div class="ps-card-header">
            <span class="ps-card-icon">${spot.icon}</span>
            <span class="ps-card-name">${escapeHtml(spot.spot_name)}</span>
            <button class="ps-card-locate" data-lat="${spot.lat}" data-lng="${spot.lng}">📍 ${escapeHtml(I18N.t('photoSpotLocate'))}</button>
          </div>
          <div class="ps-photo-items">${photoItems}</div>`;
        list.appendChild(card);
      });

      // 定位按钮事件
      list.querySelectorAll('.ps-card-locate').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const lat = parseFloat(btn.dataset.lat);
          const lng = parseFloat(btn.dataset.lng);
          if (map && map.setZoomAndCenter) {
            map.setZoomAndCenter(16, [lng, lat]);
            switchToMap();
          }
        });
      });
    }

  </script>
